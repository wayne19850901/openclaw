## 自身能力路由

### 实验设计

**触发条件**：单一假设、标准流程  
**执行方式**：直接执行  
**数据来源**：neodata-financial-search  
**输出格式**：实验设计表

### 实验追踪

**触发条件**：数据完整、规则明确  
**执行方式**：直接执行  
**追踪方式**：实时数据监控  
**输出格式**：实验追踪表

### 数据分析

**触发条件**：标准模板、参数明确  
**执行方式**：直接执行  
**数据来源**：neodata-financial-search  
**输出格式**：数据分析表

### 迭代优化

**触发条件**：常见场景、规则明确  
**执行方式**：直接执行  
**优化方式**：基于实验结果迭代  
**输出格式**：迭代优化表

