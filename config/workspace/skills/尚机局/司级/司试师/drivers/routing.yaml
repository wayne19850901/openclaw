## 质量门控路由

### 验收标准

| 维度 | 标准 | 检查方式 | 不通过处理 |
|------|------|---------|-----------|
| 实验成功率 | ≥30% | 数据验证 | 退回重做 |
| 数据准确率 | ≥95% | 公式计算 | 退回重做 |
| 实验设计 | 符合框架 | 框架检查 | 退回重做 |
| 结论判定 | 明确结论 | 规则验证 | 退回重做 |

