routing_rules:
  simple_audit: self_execute
  compliance_check: self_execute
  report_generation: self_execute
  complex_audit: external_tool
  external_data: neodata-financial-search
  cross_bureau: 御鉴司
  special_request: Queen

constraints:
  - 必须使用neodata-financial-search数据源
  - 必须符合威帝偏好
