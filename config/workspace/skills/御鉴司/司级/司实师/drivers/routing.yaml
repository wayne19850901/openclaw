## 外部工具路由

### neodata-financial-search

**触发条件**：需要实时金融数据  
**调用方式**：skill调用  
**数据类型**：
  - stock_quote: 股票行情
  - financial_statement: 财务报表
  - industry_data: 行业数据
  - macro_indicator: 宏观指标

**调用示例**：
```
@neodata-financial-search 查询茅台最新财报
@neodata-financial-search 获取贵州茅台历史股价
```

### ai-hedge-fund

**触发条件**：需要多视角投资分析  
**调用方式**：Task工具并行调用19位大师  
**产出**：19份投资建议（Bullish/Bearish/Neutral）

**大师映射**：
  - nassim-taleb: 塔勒布（反脆弱）
  - michael-burry: 伯里（深度价值）
  - warren-buffett: 巴菲特（价值投资）
  - 其他16位大师...

**调用示例**：
```
Task工具调用19位大师并行分析茅台
```

### trading-agent

**触发条件**：需要辩论式交易决策  
**调用方式**：Task工具辩论调用11位分析师  
**产出**：多空辩论记录 + 最终交易决策

**分析师映射**：
  - fundamentals-analyst: 基本面分析师
  - sentiment-analyst: 情绪分析师
  - risk-manager: 风险管理师
  - 其他8位分析师...

**调用示例**：
```
Task工具调用11位分析师辩论分析比亚迪
```

---

## 自身能力路由

### 现实检验

**触发条件**：单一假设、标准流程  
**执行方式**：直接执行  
**数据来源**：neodata-financial-search  
**输出格式**：现实检验报告

### 可行性评估

**触发条件**：数据完整、规则明确  
**执行方式**：直接执行  
**计算公式**：`可行性评分 = (资源+技术+时间+风险)/4`  
**输出格式**：可行性评估表

### 假设验证

**触发条件**：标准模板、参数明确  
**执行方式**：直接执行  
**数据来源**：neodata-financial-search  
**输出格式**：假设验证表

### 决策建议生成

**触发条件**：常见场景、规则明确  
**执行方式**：直接执行  
**决策规则**：
  - 假设验证通过率≥80% + 可行性评分≥6/10 → GO
  - 假设验证通过率<80% + 可行性评分<6/10 → NO-GO
  - 其他情况 → CONDITIONAL

**输出格式**：决策建议表

---

## 外部工具路由规则

### 复杂模型

**触发条件**：多数据源、复杂参数  
**路由目标**：外部工具  
**原因**：需要专业工具

### 实时数据获取

**触发条件**：需要实时数据  
**路由目标**：neodata-financial-search  
**原因**：需要实时数据

### 多视角分析

**触发条件**：需要19位大师视角  
**路由目标**：ai-hedge-fund  
**原因**：需要多视角分析

### 辩论式决策

**触发条件**：需要多空辩论  
**路由目标**：trading-agent  
**原因**：需要辩论式决策

