## 质量门控路由

### 验收标准

| 维度 | 标准 | 检查方式 | 不通过处理 |
|------|------|---------|-----------|
| 假设验证 | ≥80%通过率 | 数据验证 | 退回重做 |
| 可行性评分 | ≥6/10 | 公式计算 | 退回重做 |
| 现实检验 | 符合框架 | 框架检查 | 退回重做 |
| 决策建议 | 明确决策 | 规则验证 | 退回重做 |

